name = PropertiesConfig
property.filename = D:/Automation/BusinessnextPortal/automation/src/test/resources/resources/LogFiles

appenders = console, file

# -------------------- Console Appender --------------------
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n

# -------------------- Rolling File Appender --------------------
appender.file.type = RollingFile
appender.file.name = LogFile
appender.file.fileName = ${filename}/AutomationTest.log
appender.file.filePattern = ${filename}/logs-%d{yyyy-MM-dd}.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.file.append = false

# Trigger policy
appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.time.modulate = true

# -------------------- Root Logger --------------------
rootLogger.level = debug
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = STDOUT
rootLogger.appenderRef.file.ref = LogFile